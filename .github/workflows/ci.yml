name: CI

# Scope: typecheck + JS build only. Native module compile (winax / node-gyp)
# is intentionally skipped — see ROADMAP.md "CI narrowed to skip native module
# compile" for the full reasoning. Native rebuild happens at packaging time
# via electron-builder, not on every PR.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build:
    name: build
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Detect scaffold
        id: scaffold
        shell: bash
        run: |
          if [ -f package.json ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No package.json yet — skipping install/typecheck/build. This job will run real checks once the Electron scaffold lands."
          fi

      - name: Setup Node
        if: steps.scaffold.outputs.ready == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies (skip native builds)
        if: steps.scaffold.outputs.ready == 'true'
        # --ignore-scripts skips winax's node-gyp rebuild and
        # electron-builder's install-app-deps. We only verify JS-level
        # correctness in CI; native compile happens at packaging time.
        run: npm ci --ignore-scripts

      - name: Typecheck
        if: steps.scaffold.outputs.ready == 'true'
        run: npx tsc --noEmit

      - name: Build
        if: steps.scaffold.outputs.ready == 'true'
        run: npm run build
