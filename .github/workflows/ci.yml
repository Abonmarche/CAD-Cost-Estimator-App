name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build:
    name: build
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Detect scaffold
        id: scaffold
        shell: bash
        run: |
          if [ -f package.json ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No package.json yet — skipping install/typecheck/build. This job will run real checks once the Electron scaffold lands."
          fi

      - name: Setup Node
        if: steps.scaffold.outputs.ready == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # node-gyp (used by winax) imports distutils, which was removed from
      # Python 3.12. windows-latest ships 3.12 by default — pin to 3.11 so
      # native module builds work.
      - name: Setup Python 3.11 for node-gyp
        if: steps.scaffold.outputs.ready == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        if: steps.scaffold.outputs.ready == 'true'
        run: npm ci

      - name: Rebuild native modules for Electron
        if: steps.scaffold.outputs.ready == 'true'
        run: npx --no-install electron-rebuild || npx electron-rebuild

      - name: Typecheck
        if: steps.scaffold.outputs.ready == 'true'
        run: npx tsc --noEmit

      - name: Build
        if: steps.scaffold.outputs.ready == 'true'
        run: npm run build
